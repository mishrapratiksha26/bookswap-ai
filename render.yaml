services:
  - type: web
    name: bookswap-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_URL
        sync: false        # set manually in Render dashboard
      - key: DB_NAME
        value: test
      - key: GROQ_API_KEY
        sync: false        # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
