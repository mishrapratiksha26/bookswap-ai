# Render service config for the BookSwap FastAPI backend.
#
# Runtime: Docker. We switched away from Render's standard Python runtime
# because that runtime sandboxes apt-get during the build phase, which
# made it impossible to install Tesseract for the scanned-PDF OCR path.
# Docker gives the build full root access, so the Dockerfile installs
# tesseract-ocr + tesseract-ocr-eng during the image build and the OCR
# fallback in chapter_extractor.py works on Render exactly as it does
# on the developer's laptop.
#
# IMPORTANT: this file is only auto-applied when the service is created
# via Render's Blueprint flow ("New + → Blueprint"). If the service was
# created the old way ("New + → Web Service") and is still configured as
# Python runtime, you must either:
#   (a) recreate it via Blueprint pointing at this repo, OR
#   (b) in the dashboard, change the service's "Language / Runtime" to
#       Docker — Render then uses ./Dockerfile and ignores buildCommand.
#
# Secrets (DB_URL, GROQ_API_KEY) are sync:false — set them in the Render
# dashboard. Anything with `value:` is safe to be public.
services:
  - type: web
    name: bookswap-ai
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_URL
        sync: false        # set manually in Render dashboard (Atlas connection string)
      - key: DB_NAME
        value: test
      - key: GROQ_API_KEY
        sync: false        # set manually in Render dashboard
      # TESSDATA_PREFIX is set inside the Dockerfile (ENV instruction)
      # so it travels with the image, not via Render's env-var injection.
      # PYTHON_VERSION is pinned by the FROM line in the Dockerfile, not
      # here — both kept in one place reduces drift.
